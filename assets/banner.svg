<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" fill="none" role="img" aria-label="Inshad Ali Iqbal — Full-stack and AI developer">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="blobA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur30" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <clipPath id="card"><rect x="4" y="4" width="892" height="212" rx="28"/></clipPath>
  </defs>

  <!-- Card base -->
  <rect x="4" y="4" width="892" height="212" rx="28" fill="#23262d"/>

  <!-- Drifting aurora blobs (clipped to the card) -->
  <g clip-path="url(#card)">
    <circle cx="180" cy="40" r="150" fill="url(#blobA)" filter="url(#blur30)">
      <animateTransform attributeName="transform" type="translate" dur="14s" repeatCount="indefinite"
        values="0 0; 60 40; -20 20; 0 0"/>
    </circle>
    <circle cx="760" cy="200" r="170" fill="url(#blobB)" filter="url(#blur30)">
      <animateTransform attributeName="transform" type="translate" dur="16s" repeatCount="indefinite"
        values="0 0; -50 -30; 30 -10; 0 0"/>
    </circle>

    <!-- Floating particles -->
    <g fill="#6ee7ef">
      <circle cx="330" cy="60" r="2">
        <animate attributeName="cy" values="60;40;60" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="520" cy="170" r="2.5">
        <animate attributeName="cy" values="170;150;170" dur="7.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.15;0.8;0.15" dur="7.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="640" cy="70" r="1.8">
        <animate attributeName="cy" values="70;95;70" dur="5.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="5.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Neumorphic border highlight -->
  <rect x="4.5" y="4.5" width="891" height="211" rx="27.5" fill="none" stroke="#31353e" stroke-opacity="0.6"/>

  <!-- ===== Avatar (extruded neumorphic circle) ===== -->
  <circle cx="118" cy="118" r="48" fill="#15171b" filter="url(#soft)"/>
  <circle cx="102" cy="102" r="48" fill="#31353e" filter="url(#soft)"/>
  <circle cx="110" cy="110" r="48" fill="#23262d"/>
  <text x="110" y="122" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="34" font-weight="700" fill="url(#accent)">IA</text>
  <!-- pulsing status dot -->
  <circle cx="144" cy="146" r="8" fill="#34e39a" stroke="#23262d" stroke-width="3">
    <animate attributeName="r" values="7;9;7" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== Text block ===== -->
  <text x="192" y="92" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="42" font-weight="700" fill="#e7eaf0">
    Inshad Ali Iqbal
  </text>

  <!-- animated accent underline -->
  <rect x="194" y="104" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;250;250" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="194" y="140" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="19" fill="#9aa2b4">
    Full-stack &amp; AI developer
  </text>
  <text x="194" y="168" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#6b7280">
    Flutter · Python / FastAPI · React / TypeScript
  </text>

  <!-- ===== Equalizer bars (right side, nods to Orpheus/music work) ===== -->
  <g fill="url(#accent)" transform="translate(770,150)">
    <rect x="0"  width="10" rx="5" height="20">
      <animate attributeName="height" values="20;60;12;40;20" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;-40;8;-20;0" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="20" width="10" rx="5" height="40">
      <animate attributeName="height" values="40;12;58;24;40" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;28;-38;16;0" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="40" width="10" rx="5" height="30">
      <animate attributeName="height" values="30;54;18;62;30" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;-24;12;-32;0" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" width="10" rx="5" height="48">
      <animate attributeName="height" values="48;16;44;20;48" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;32;4;28;0" dur="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
