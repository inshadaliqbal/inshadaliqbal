<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" fill="none" role="img" aria-label="Inshad Ali Iqbal — Full-stack and AI engineer">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5e8bff"/><stop offset="1" stop-color="#46e5ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5e8bff" stop-opacity="0.5"/><stop offset="1" stop-color="#5e8bff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="26"/></filter>
    <clipPath id="card"><rect x="1" y="1" width="898" height="218"/></clipPath>
  </defs>

  <!-- base -->
  <rect x="1" y="1" width="898" height="218" fill="#07080c"/>
  <g clip-path="url(#card)">
    <rect width="900" height="220" fill="url(#grid)"/>
    <circle cx="150" cy="40" r="150" fill="url(#glow)" filter="url(#soft)">
      <animate attributeName="cx" values="150;250;150" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="200" r="150" fill="url(#glow)" filter="url(#soft)" opacity="0.7">
      <animate attributeName="cy" values="200;120;200" dur="18s" repeatCount="indefinite"/>
    </circle>
    <!-- moving scan line -->
    <rect x="0" width="900" height="2" fill="#46e5ff" opacity="0.25">
      <animate attributeName="y" values="0;220;0" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="1" y="1" width="898" height="218" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>

  <!-- corner brackets -->
  <g stroke="url(#acc)" stroke-width="2" fill="none">
    <path d="M18 40V18H40"/><path d="M860 18H882V40"/>
    <path d="M18 180V202H40"/><path d="M860 202H882V180"/>
  </g>

  <!-- text -->
  <text x="60" y="78" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="13" letter-spacing="3" fill="#46e5ff">// FULL-STACK &amp; AI ENGINEER — IND</text>
  <text x="58" y="128" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="46" font-weight="700" letter-spacing="1" fill="#eceef5">INSHAD ALI IQBAL</text>

  <!-- animated accent underline -->
  <rect x="60" y="144" height="3" rx="1.5" fill="url(#acc)">
    <animate attributeName="width" values="0;300;300" keyTimes="0;0.5;1" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0.35;1" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <text x="60" y="178" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" fill="#7c8398">
    <tspan fill="#5e8bff">$</tspan> flutter · python/fastapi · react/typescript<tspan fill="#46e5ff" font-weight="700">▋<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan>
  </text>

  <!-- HUD ring (right) -->
  <g transform="translate(795,110)">
    <circle r="46" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <circle r="46" fill="none" stroke="url(#acc)" stroke-width="2" stroke-dasharray="46 245" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="33" fill="none" stroke="#46e5ff" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" fill="url(#acc)">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- ticks -->
    <g stroke="#7c8398" stroke-width="1.5">
      <line x1="0" y1="-52" x2="0" y2="-58"/><line x1="52" y1="0" x2="58" y2="0"/>
      <line x1="0" y1="52" x2="0" y2="58"/><line x1="-52" y1="0" x2="-58" y2="0"/>
    </g>
  </g>

  <!-- bottom readout -->
  <text x="60" y="202" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" letter-spacing="2" fill="#4a5063">SYS ONLINE · LAT 8.5241N · LON 76.9366E · RENDER OK</text>
</svg>
