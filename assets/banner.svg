<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" fill="none" role="img" aria-label="Inshad Ali Iqbal — Full-stack and AI engineer">
  <defs>
    <radialGradient id="pool" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="30"/></filter>
    <clipPath id="card"><rect x="1" y="1" width="898" height="218" rx="22"/></clipPath>
  </defs>

  <!-- base -->
  <rect x="1" y="1" width="898" height="218" rx="22" fill="#060608"/>
  <g clip-path="url(#card)">
    <!-- drifting light pools -->
    <circle cx="180" cy="30" r="150" fill="url(#pool)" filter="url(#soft)" opacity="0.5">
      <animate attributeName="cx" values="180;300;180" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="210" r="150" fill="url(#pool)" filter="url(#soft)" opacity="0.35">
      <animate attributeName="cy" values="210;140;210" dur="19s" repeatCount="indefinite"/>
    </circle>

    <!-- frosted glass "bricks" (nod to Glass Breaker) -->
    <g>
      <rect x="628" y="60" width="70" height="26" rx="6" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
      <rect x="706" y="60" width="70" height="26" rx="6" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
      <rect x="784" y="60" width="70" height="26" rx="6" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22"/>
      <rect x="628" y="94" width="70" height="26" rx="6" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22"/>
      <rect x="706" y="94" width="70" height="26" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.15"/>
      <rect x="784" y="94" width="70" height="26" rx="6" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
      <!-- top specular bands -->
      <rect x="628" y="60" width="70" height="12" rx="6" fill="url(#spec)"/>
      <rect x="784" y="60" width="70" height="12" rx="6" fill="url(#spec)"/>
      <rect x="628" y="94" width="70" height="12" rx="6" fill="url(#spec)"/>
    </g>
    <!-- glowing ball + paddle -->
    <circle cx="742" cy="150" r="7" fill="#ffffff">
      <animate attributeName="cx" values="700;790;700" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;138;150" dur="2s" repeatCount="indefinite"/>
    </circle>
    <rect x="706" y="168" width="72" height="8" rx="4" fill="#ffffff" fill-opacity="0.85">
      <animate attributeName="x" values="690;730;690" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- diagonal glass sweep -->
    <rect x="-300" y="0" width="300" height="220" fill="url(#sweep)" transform="skewX(-18)">
      <animate attributeName="x" values="-300;1000" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- glass card border + corner brackets -->
  <rect x="1.5" y="1.5" width="897" height="217" rx="21.5" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
  <g stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <path d="M20 40V20H40"/><path d="M860 20H880V40"/><path d="M20 180V200H40"/><path d="M860 200H880V180"/>
  </g>

  <!-- text -->
  <text x="60" y="76" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="13" letter-spacing="3" fill="#c2c6d2">// FULL-STACK &amp; AI ENGINEER — IND</text>
  <text x="58" y="126" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="44" font-weight="700" letter-spacing="1" fill="#f1f2f5">INSHAD ALI IQBAL</text>
  <rect x="60" y="142" height="3" rx="1.5" fill="#ffffff">
    <animate attributeName="width" values="0;300;300" keyTimes="0;0.5;1" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0.35;1" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <text x="60" y="176" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" fill="#9a9ba6">
    <tspan fill="#c2c6d2">$</tspan> flutter · python/fastapi · react/typescript<tspan fill="#ffffff" font-weight="700">▋<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan>
  </text>
  <text x="60" y="200" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" letter-spacing="2" fill="#5a5b66">SYS ONLINE · GLASS.RENDER OK · PLAY THE PORTFOLIO</text>
</svg>
